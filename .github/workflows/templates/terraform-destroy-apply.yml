name: Terraform Destroy Apply Template

on:
  workflow_call:
    inputs:
      terraform_version:
        description: 'Terraform version to use'
        required: true
        type: string
      working_directory:
        description: 'Working directory for Terraform'
        required: true
        type: string
    secrets:
      DATADOG_API_KEY:
        required: true
      DATADOG_APP_KEY:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      TF_STATE_BUCKET:
        required: true
      TF_STATE_KEY:
        required: true

jobs:
  terraform-destroy-apply:
    name: Terraform Destroy Apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create backend config
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo 'bucket  = "${{ secrets.TF_STATE_BUCKET }}"' > backend.s3.hcl
          echo 'key     = "${{ secrets.TF_STATE_KEY }}"' >> backend.s3.hcl
          echo 'region  = "${{ secrets.AWS_REGION }}"' >> backend.s3.hcl
          echo 'encrypt = true' >> backend.s3.hcl

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -backend-config=backend.s3.hcl
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}

      - name: Download Terraform Destroy Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-destroy-plan
          path: ${{ inputs.working_directory }}

      - name: Terraform Destroy Apply
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve tfplan-destroy
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}
