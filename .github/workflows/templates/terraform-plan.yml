name: Terraform Plan Template

on:
  workflow_call:
    inputs:
      terraform_version:
        description: 'Terraform version to use'
        required: true
        type: string
      working_directory:
        description: 'Working directory for Terraform'
        required: true
        type: string
    secrets:
      DATADOG_API_KEY:
        required: true
      DATADOG_APP_KEY:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      TF_STATE_BUCKET:
        required: true
      TF_STATE_KEY:
        required: true
    outputs:
      plan_artifact_name:
        description: 'Name of the plan artifact'
        value: ${{ jobs.terraform-plan.outputs.plan_artifact_name }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      plan_artifact_name: terraform-plan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create backend config
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo 'bucket  = "${{ secrets.TF_STATE_BUCKET }}"' > backend.s3.hcl
          echo 'key     = "${{ secrets.TF_STATE_KEY }}"' >> backend.s3.hcl
          echo 'region  = "${{ secrets.AWS_REGION }}"' >> backend.s3.hcl
          echo 'encrypt = true' >> backend.s3.hcl

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -backend-config=backend.s3.hcl
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}

      - name: Terraform Format Check
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          set +e
          terraform plan -out=tfplan -no-color
          plan_exit=$?
          set -e
          [ $plan_exit -eq 1 ] && exit 1
          exit 0
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}

      - name: Show Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        run: terraform show -no-color tfplan
        continue-on-error: true

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 5
