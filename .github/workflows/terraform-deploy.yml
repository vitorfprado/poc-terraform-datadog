name: Terraform Deploy

# Trigger manual apenas (fase de testes). Reative push/pull_request quando for para produção.
on:
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Execute destroy workflow'
        required: false
        type: boolean
        default: false
      destroy_confirmation:
        description: '⚠️ RISCO: Destroy remove recursos permanentemente. Tem certeza? Digite exatamente DESTROY (em maiúsculas) para confirmar.'
        required: false
        type: string
        default: ''

env:
  TERRAFORM_VERSION: '1.6.0'
  WORKING_DIRECTORY: 'root-module'

jobs:
  plan:
    name: Terraform Plan
    if: github.event.inputs.destroy != 'true'
    uses: ./.github/workflows/templates/terraform-plan.yml
    with:
      terraform_version: ${{ env.TERRAFORM_VERSION }}
      working_directory: ${{ env.WORKING_DIRECTORY }}
    secrets:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
      DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

  apply:
    name: Terraform Apply
    needs: plan
    if: github.event.inputs.destroy != 'true' && (github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push'))
    uses: ./.github/workflows/templates/terraform-apply.yml
    environment:
      name: apply-approval
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    with:
      terraform_version: ${{ env.TERRAFORM_VERSION }}
      working_directory: ${{ env.WORKING_DIRECTORY }}
    secrets:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
      DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

  destroy-plan:
    name: Terraform Destroy Plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'true' && github.event.inputs.destroy_confirmation == 'DESTROY'
    uses: ./.github/workflows/templates/terraform-destroy-plan.yml
    with:
      terraform_version: ${{ env.TERRAFORM_VERSION }}
      working_directory: ${{ env.WORKING_DIRECTORY }}
    secrets:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
      DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}

  destroy-validation:
    name: Validar confirmação do Destroy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'true' && github.event.inputs.destroy_confirmation != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - name: Confirmação inválida
        run: |
          echo "::error::Para executar o destroy você deve marcar a opção de destroy E digitar exatamente DESTROY (em maiúsculas) no campo de confirmação. Operação cancelada."
          exit 1

  destroy-apply:
    name: Terraform Destroy Apply
    needs: destroy-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'true' && github.event.inputs.destroy_confirmation == 'DESTROY'
    uses: ./.github/workflows/templates/terraform-destroy-apply.yml
    environment:
      name: destroy-approval
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    with:
      terraform_version: ${{ env.TERRAFORM_VERSION }}
      working_directory: ${{ env.WORKING_DIRECTORY }}
    secrets:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
      DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
