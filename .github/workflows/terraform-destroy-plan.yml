name: Terraform Destroy Plan Template

on:
  workflow_call:
    inputs:
      terraform_version:
        description: 'Terraform version to use'
        required: true
        type: string
      working_directory:
        description: 'Working directory for Terraform'
        required: true
        type: string
    secrets:
      DATADOG_API_KEY:
        required: true
      DATADOG_APP_KEY:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      TF_STATE_BUCKET:
        required: true
      TF_STATE_KEY:
        required: true
    outputs:
      destroy_plan_artifact_name:
        description: 'Name of the destroy plan artifact'
        value: ${{ jobs.terraform-destroy-plan.outputs.destroy_plan_artifact_name }}

jobs:
  terraform-destroy-plan:
    name: Terraform Destroy Plan
    runs-on: ubuntu-latest
    outputs:
      destroy_plan_artifact_name: terraform-destroy-plan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create backend config
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo 'bucket  = "${{ secrets.TF_STATE_BUCKET }}"' > backend.s3.hcl
          echo 'key     = "${{ secrets.TF_STATE_KEY }}"' >> backend.s3.hcl
          echo 'region  = "${{ secrets.AWS_REGION }}"' >> backend.s3.hcl
          echo 'encrypt = true' >> backend.s3.hcl

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -backend-config=backend.s3.hcl
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}

      - name: Terraform Destroy Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: terraform plan -destroy -out=tfplan-destroy -no-color
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
          TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}

      - name: Show Terraform Destroy Plan
        working-directory: ${{ inputs.working_directory }}
        run: terraform show -no-color tfplan-destroy
        continue-on-error: true

      - name: Upload Terraform Destroy Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-destroy-plan
          path: ${{ inputs.working_directory }}/tfplan-destroy
          retention-days: 5
